[hardware]
profile = "nvidia"
depth_mode = "metric"

[camera]
id = 0
width = 640
height = 480
max_read_retries = 5

[calibration]
file = "calibration.npz"
cols = 9
rows = 6
square_mm = 18.0
min_frames = 20

[model]
id = "depth-anything/da3metric-large"

[rpi]
hef_path = "models/depth_anything_v2_vits.hef"
model_input_width = 224
model_input_height = 224

[depth]
depth_map_save_location = "depth_map.npy"

[ground]
seed_region = 0.5
ransac_iterations = 50
plane_smoothing = 0.85
normal_threshold = 0.91
ransac_threshold_metric = 0.05
ransac_threshold_relative = 0.03
ground_map_save_location = "ground_mask.npy"

[visualization]
window_title = "DA3 Calibrated Live Feed"
ground_overlay_alpha = 0.45
ground_colour_bgr = [0, 220, 80]
colorbar_width = 70

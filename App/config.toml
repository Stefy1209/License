[camera]
id             = 0
width          = 640
height         = 480
max_read_retries = 5

[calibration]
file           = "calibration.npz"
cols           = 9
rows           = 6
square_mm      = 18
min_frames     = 20

[model]
id             = "depth-anything/da3metric-large"

[depth]
depth_map_save_location = "depth_map.npy"

[ground]
seed_region        = 0.40   # fraction of image height (from bottom) used to seed RANSAC
ransac_threshold   = 0.08   # inlier tolerance in metres
ransac_iterations  = 200
plane_smoothing    = 0.85   # EMA factor for temporal smoothing
normal_threshold   = 0.91   # min |cos(angle)| to accept plane as ground (cos 25° ≈ 0.91)

[visualization]
window_title        = "DA3 Calibrated Live Feed"
ground_overlay_alpha = 0.45
ground_colour_bgr    = [0, 220, 80]  # BGR
colorbar_width       = 70
